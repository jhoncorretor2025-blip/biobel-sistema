<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Biobel - Saída de Caixa</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <aside class="sidebar">
    <h1>Biobel</h1>
    <nav>
      <button onclick="location.href='vendas.html'">Vendas</button>
      <button onclick="location.href='caixa.html'">Caixa</button>
      <button onclick="location.href='saida-caixa.html'">Saída</button>
      <button onclick="location.href='dashboard.html'">Dashboard</button>
      <button onclick="location.href='configuracao.html'">Configuração</button>
    </nav>
  </aside>

  <main class="container">
    <header class="topbar">
      <h2>Saída de Caixa</h2>
    </header>

    <section class="content">
      <div class="card">
        <label>Data</label>
        <input id="saidaData" type="date" />
        <label>Valor R$</label>
        <input id="saidaValor" type="number" />
        <label>Forma</label>
        <select id="saidaForma"><option>Dinheiro</option><option>PIX</option><option>Depósito</option></select>
        <label>Descrição</label>
        <input id="saidaDescricao" placeholder="Ex: pagamento fornecedor" />
        <button onclick="registrarSaida()">Registrar Saída</button>
      </div>

      <div class="card">
        <h4>Total de saídas hoje: R$ <span id="totalSaidasHoje">0.00</span></h4>
        <ul id="listaSaidas"></ul>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
  <script> window.addEventListener('load', ()=>{ if(window.initSaida) initSaida(); }); </script>
</body>
</html>
