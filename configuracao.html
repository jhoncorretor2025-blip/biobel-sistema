<div class="dashboard" id="config">

<h2>Configuração</h2>

<h3>Cadastrar Produto</h3>

<input id="novoProduto" placeholder="Nome do produto">
<input id="novoPreco" placeholder="Preço">
<select id="novaCategoria">
<option value="cabelo">Cabelo</option>
<option value="perfume">Perfume</option>
<option value="maquiagem">Maquiagem</option>
<option value="cremes">Cremes</option>
</select>

<button onclick="cadastrarProduto()">Cadastrar Produto</button>

<hr style="margin:20px 0">

<h3>Cadastrar Vendedora</h3>

<input id="novaVendedora" placeholder="Nome da vendedora">

<button onclick="cadastrarVendedora()">Cadastrar</button>

<div id="listaVendedoras"></div>

</div>
