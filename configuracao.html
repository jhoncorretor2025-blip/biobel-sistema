<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Biobel - Configuração</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <aside class="sidebar">
    <h1>Biobel</h1>
    <nav>
      <button onclick="location.href='vendas.html'">Vendas</button>
      <button onclick="location.href='caixa.html'">Caixa</button>
      <button onclick="location.href='saida-caixa.html'">Saída</button>
      <button onclick="location.href='dashboard.html'">Dashboard</button>
      <button onclick="location.href='configuracao.html'">Configuração</button>
    </nav>
  </aside>

  <main class="container">
    <header class="topbar">
      <h2>Configuração</h2>
    </header>

    <section class="content config-grid">
      <div class="card">
        <h3>Vendedoras</h3>
        <input id="inputVendedora" placeholder="Nome da vendedora" />
        <button onclick="cadastrarVendedora()">Adicionar</button>
        <ul id="listaVendedoras"></ul>
      </div>

      <div class="card">
        <h3>Marcas</h3>
        <input id="inputMarca" placeholder="Nome da marca" />
        <button onclick="cadastrarMarca()">Adicionar</button>
        <ul id="listaMarcas"></ul>
      </div>

      <div class="card">
        <h3>Categorias</h3>
        <input id="inputCategoria" placeholder="Nova categoria" />
        <button onclick="cadastrarCategoria()">Adicionar</button>
        <ul id="listaCategorias"></ul>
      </div>

      <div class="card">
        <h3>Produtos</h3>
        <input id="prodNome" placeholder="Nome" />
        <input id="prodMarca" placeholder="Marca" />
        <input id="prodCategoria" placeholder="Categoria" />
        <input id="prodPreco" type="number" placeholder="Preço R$" />
        <button onclick="cadastrarProdutoConfig()">Cadastrar Produto</button>
        <ul id="listaProdutosConfig"></ul>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
  <script>
    // inicializa configs ao abrir a página
    window.addEventListener('load', ()=>{ if(window.initConfig) initConfig(); });
  </script>
</body>
</html>
