<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Biobel - Caixa</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <aside class="sidebar">
    <h1>Biobel</h1>
    <nav>
      <button onclick="location.href='vendas.html'">Vendas</button>
      <button onclick="location.href='caixa.html'">Caixa</button>
      <button onclick="location.href='saida-caixa.html'">Saída</button>
      <button onclick="location.href='dashboard.html'">Dashboard</button>
      <button onclick="location.href='configuracao.html'">Configuração</button>
    </nav>
  </aside>

  <main class="container">
    <header class="topbar">
      <h2>Caixa</h2>
    </header>

    <section class="content">
      <div class="card">
        <label>Saldo inicial R$</label>
        <input id="saldoInicialInput" type="number" placeholder="Ex: 200" />
        <button onclick="setSaldoInicial()">Salvar Saldo Inicial</button>
      </div>

      <div class="card">
        <h4>Resumo do dia</h4>
        <p>Entradas (vendas): R$ <span id="caixaEntradas">0.00</span></p>
        <p>Saídas: R$ <span id="caixaSaidas">0.00</span></p>
        <p>Saldo atual: R$ <span id="caixaSaldoAtual">0.00</span></p>
      </div>

      <div class="card">
        <h4>Histórico de movimentos (vendas e saídas)</h4>
        <ul id="historicoMov"></ul>
      </div>

    </section>
  </main>

  <script src="js/app.js"></script>
  <script> window.addEventListener('load', ()=>{ if(window.initCaixa) initCaixa(); }); </script>
</body>
</html>
