<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Biobel - Vendas</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <aside class="sidebar">
    <h1>Biobel</h1>
    <nav>
      <button onclick="location.href='vendas.html'">Vendas</button>
      <button onclick="location.href='caixa.html'">Caixa</button>
      <button onclick="location.href='saida-caixa.html'">Saída</button>
      <button onclick="location.href='dashboard.html'">Dashboard</button>
      <button onclick="location.href='configuracao.html'">Configuração</button>
    </nav>
  </aside>

  <main class="container">
    <header class="topbar">
      <h2>Vendas</h2>
      <div class="search-row">
        <input id="buscarProduto" placeholder="Buscar produto ou marca..." />
        <button onclick="filtrarBusca()">Buscar</button>
        <button onclick="filtrarCategoria('todos')">Todos</button>
        <button onclick="filtrarCategoria('cabelo')">Cabelo</button>
        <button onclick="filtrarCategoria('perfume')">Perfume</button>
        <button onclick="filtrarCategoria('maquiagem')">Maquiagem</button>
        <button onclick="filtrarCategoria('cremes')">Cremes</button>
      </div>
    </header>

    <section class="content">
      <div class="col produtos-col">
        <div class="produtos-grid" id="listaProdutos"></div>

        <div class="manual-card">
          <h3>Adicionar produto manual (avulso)</h3>
          <input id="manualNome" placeholder="Nome do produto" />
          <input id="manualMarca" placeholder="Marca (opcional)" />
          <input id="manualPreco" type="number" placeholder="Preço R$" />
          <input id="manualQtd" type="number" placeholder="Quantidade" value="1" />
          <button onclick="adicionarManual()">Adicionar manual ao carrinho</button>
        </div>

      </div>

      <aside class="col carrinho-col">
        <h3>Carrinho / Venda</h3>

        <div id="carrinhoItens" class="carrinho-list"></div>

        <hr />

        <label>Vendedora</label>
        <select id="vendedoraSelect"></select>

        <label>Turno</label>
        <select id="turnoSelect">
          <option>Manhã</option>
          <option>Tarde</option>
        </select>

        <label>Pagamento (preencha valores em cada campo)</label>
        <input id="pagDinheiro" type="number" placeholder="Dinheiro R$" />
        <input id="pagPix" type="number" placeholder="PIX R$" />
        <input id="pagDebito" type="number" placeholder="Débito R$" />
        <input id="pagCredito" type="number" placeholder="Crédito R$" />
        <input id="pagLink" type="number" placeholder="Link de pagamento R$" />

        <div class="row">
          <label><input id="somenteTotalChk" type="checkbox" /> Registrar só o total (sem produtos)</label>
        </div>

        <div id="totalManualRow" style="display:none;">
          <input id="totalManual" type="number" placeholder="Valor total R$" />
        </div>

        <div class="total-box">
          <div>Total calculado: R$ <span id="totalCalc">0.00</span></div>
        </div>

        <button class="btn-primary" onclick="finalizarVenda()">Finalizar Venda</button>

        <hr />

        <div class="atendimentos">
          <h4>ATENDIMENTOS DO DIA</h4>
          <div id="painelAtendimentos"></div>
        </div>

      </aside>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
